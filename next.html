<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcade Message</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5c6d6;
    font-family: 'Press Start 2P';
}

/* ARCADE FRAME */
.arcade {
    width: 800px;
    height: 500px;
    background: black;
    border: 15px solid #6c63ff;
    border-radius: 20px;
    position: relative;
    padding: 20px;
}

/* TOP UI */
.top-ui {
    position: absolute;
    top: 10px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* HEART */
.heart {
    font-size: 20px;
}

/* BARS */
.bar-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.bar {
    width: 120px;
    height: 10px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
}

.fill-red {
    width: 100%;
    height: 100%;
    background: red;
}

.fill-yellow {
    width: 100%;
    height: 100%;
    background: gold;
}

/* SCREEN */
.screen {
    margin-top: 40px;
    height: 100%;
    overflow-y: auto;
    color: white;
    font-size: 10px;
    line-height: 1.8;
    padding-right: 10px;
}

/* BACK BUTTON */
.back-btn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 10px 15px;
    font-size: 10px;
    border: none;
    border-radius: 10px;
    background: white;
    color: black;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="arcade">

    <!-- TOP UI -->
    <div class="top-ui">
        <div class="bar-container">
            <span class="heart">❤️</span>
            <div class="bar"><div class="fill-red"></div></div>
        </div>

        <div class="bar-container">
            <span>⚡</span>
            <div class="bar"><div class="fill-yellow"></div></div>
        </div>
    </div>

    <!-- SCREEN -->
    <div class="screen" id="text"></div>

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">← BACK</button>

</div>

<script>
const message = `baby, gusto ko lng sabihin sayo na prank lang yung nasa note ko. Tungkol talaga dito yun. I wanted to surprise you kasi lately hindi ko na po nagagawa yung mga ganto kasi sa sobrang busy. That’s why nung nasa school ako, eto ginawa ko during free time.

Baby ko gusto ko lng sabihin wala po akong iba oki? Hehe part lang po ng surprise ko po mahal. Always remember I love you po ah? Lagi ko nmn po sinasabi dba walang sino man po papalit sayo or kaya kang higitan. Ik lately puro away tayo, pero kahit ganon mas minamahal po kita, at sabi ko nmn sayo diba kahit magkaaway tayo, kakampi mo pa rin po ako:) Ik na hindi na tayo nag kikita po, pero konting tiis po ah? Loobin mahal if we’re both successful na pwede na po, pero for now tiis tiis muna oki?

Ik din baby na hindi mo po napipigilan mag overthink and selos pero I will always do my best para i-assure kita mahal. Baby I love your eyes, smile, looks, personality, and everything about you po. Mahal na mahal kita misis ko. Andito lng po ako palagi sa oras na masaya at magulo ang isip mo.`;

let i = 0;
const speed = 20; // typing speed

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);

        // auto scroll down
        let screen = document.getElementById("text");
        screen.scrollTop = screen.scrollHeight;
    }
}

typeWriter();

/* BACK FUNCTION */
function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
